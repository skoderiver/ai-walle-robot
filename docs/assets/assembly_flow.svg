<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#f8f1eb"/>
  <text x="60" y="70" font-size="34" font-family="Segoe UI, Arial, sans-serif" fill="#3a3430" font-weight="700">从 0 到展陈样机的实施流程</text>
  <text x="60" y="105" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#655b56">把项目切成几个可以单独验收的阶段，比一次性追求完整更稳。</text>

  <rect x="80" y="180" rx="18" ry="18" width="220" height="110" fill="#ead7b8" stroke="#8b6d3d" stroke-width="3"/>
  <text x="130" y="225" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#5a4626" font-weight="700">阶段 1</text>
  <text x="118" y="258" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#5a4626">需求冻结与尺寸</text>

  <rect x="350" y="180" rx="18" ry="18" width="220" height="110" fill="#dbe7d4" stroke="#56734d" stroke-width="3"/>
  <text x="400" y="225" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#354a30" font-weight="700">阶段 2</text>
  <text x="400" y="258" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#354a30">底盘验证样机</text>

  <rect x="620" y="180" rx="18" ry="18" width="220" height="110" fill="#d3e4ef" stroke="#4e7087" stroke-width="3"/>
  <text x="670" y="225" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#334a5b" font-weight="700">阶段 3</text>
  <text x="655" y="258" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#334a5b">头部与脖颈机构</text>

  <rect x="890" y="180" rx="18" ry="18" width="220" height="110" fill="#efd7d5" stroke="#93605c" stroke-width="3"/>
  <text x="940" y="225" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#633c39" font-weight="700">阶段 4</text>
  <text x="960" y="258" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#633c39">总装联调</text>

  <rect x="215" y="430" rx="18" ry="18" width="220" height="110" fill="#dbe7d4" stroke="#56734d" stroke-width="3"/>
  <text x="265" y="475" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#354a30" font-weight="700">阶段 5</text>
  <text x="245" y="508" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#354a30">喷涂与外观细化</text>

  <rect x="485" y="430" rx="18" ry="18" width="220" height="110" fill="#d3e4ef" stroke="#4e7087" stroke-width="3"/>
  <text x="535" y="475" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#334a5b" font-weight="700">阶段 6</text>
  <text x="505" y="508" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#334a5b">Unity 控制与脚本</text>

  <rect x="755" y="430" rx="18" ry="18" width="220" height="110" fill="#efd7d5" stroke="#93605c" stroke-width="3"/>
  <text x="805" y="475" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#633c39" font-weight="700">阶段 7</text>
  <text x="785" y="508" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#633c39">视觉 / AI 升级</text>

  <line x1="300" y1="235" x2="350" y2="235" stroke="#7a6c61" stroke-width="4"/>
  <polygon points="350,235 328,224 328,246" fill="#7a6c61"/>
  <line x1="570" y1="235" x2="620" y2="235" stroke="#7a6c61" stroke-width="4"/>
  <polygon points="620,235 598,224 598,246" fill="#7a6c61"/>
  <line x1="840" y1="235" x2="890" y2="235" stroke="#7a6c61" stroke-width="4"/>
  <polygon points="890,235 868,224 868,246" fill="#7a6c61"/>

  <line x1="1000" y1="290" x2="1000" y2="350" stroke="#7a6c61" stroke-width="4"/>
  <line x1="1000" y1="350" x2="325" y2="350" stroke="#7a6c61" stroke-width="4"/>
  <line x1="325" y1="350" x2="325" y2="430" stroke="#7a6c61" stroke-width="4"/>
  <polygon points="325,430 314,408 336,408" fill="#7a6c61"/>

  <line x1="435" y1="485" x2="485" y2="485" stroke="#7a6c61" stroke-width="4"/>
  <polygon points="485,485 463,474 463,496" fill="#7a6c61"/>
  <line x1="705" y1="485" x2="755" y2="485" stroke="#7a6c61" stroke-width="4"/>
  <polygon points="755,485 733,474 733,496" fill="#7a6c61"/>

  <text x="70" y="645" font-size="22" font-family="Segoe UI, Arial, sans-serif" fill="#3a3430" font-weight="700">每个阶段的过关标准</text>
  <text x="80" y="685" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#655b56">阶段 2：底盘能稳定直行与转向。</text>
  <text x="380" y="685" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#655b56">阶段 3：头部 yaw / pitch 顺滑无抖动。</text>
  <text x="710" y="685" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#655b56">阶段 6：Unity 已经能控制实体，不依赖 AI 也可演示。</text>
</svg>
