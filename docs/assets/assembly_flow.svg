<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#f8f1eb"/>
  <text x="60" y="70" font-size="34" font-family="Segoe UI, Arial, sans-serif" fill="#3a3430" font-weight="700">Unity-first 自主机器人实施流程</text>
  <text x="60" y="106" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#655b56">先把仿真、任务模型和底盘能力拆开做，再进入机载自主导航与语音代理整合，会比直接冲整机稳定得多。</text>

  <rect x="70" y="170" rx="18" ry="18" width="250" height="110" fill="#ead7b8" stroke="#8b6d3d" stroke-width="3"/>
  <text x="125" y="214" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#5a4626" font-weight="700">阶段 1</text>
  <text x="100" y="248" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#5a4626">Unity 仿真与任务模型</text>

  <rect x="365" y="170" rx="18" ry="18" width="250" height="110" fill="#dbe7d4" stroke="#56734d" stroke-width="3"/>
  <text x="420" y="214" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#354a30" font-weight="700">阶段 2</text>
  <text x="415" y="248" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#354a30">底盘与电控验证</text>

  <rect x="660" y="170" rx="18" ry="18" width="250" height="110" fill="#d3e4ef" stroke="#4e7087" stroke-width="3"/>
  <text x="715" y="214" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#334a5b" font-weight="700">阶段 3</text>
  <text x="696" y="248" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#334a5b">Jetson + ROS2 导航</text>

  <rect x="955" y="170" rx="18" ry="18" width="180" height="110" fill="#efd7d5" stroke="#93605c" stroke-width="3"/>
  <text x="1003" y="214" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#633c39" font-weight="700">阶段 4</text>
  <text x="982" y="248" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#633c39">语音与 GPT 代理</text>

  <rect x="130" y="430" rx="18" ry="18" width="250" height="110" fill="#ead7b8" stroke="#8b6d3d" stroke-width="3"/>
  <text x="185" y="474" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#5a4626" font-weight="700">阶段 5</text>
  <text x="165" y="508" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#5a4626">总装与安全联调</text>

  <rect x="425" y="430" rx="18" ry="18" width="250" height="110" fill="#dbe7d4" stroke="#56734d" stroke-width="3"/>
  <text x="480" y="474" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#354a30" font-weight="700">阶段 6</text>
  <text x="460" y="508" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#354a30">单层自主导航验收</text>

  <rect x="720" y="430" rx="18" ry="18" width="250" height="110" fill="#d3e4ef" stroke="#4e7087" stroke-width="3"/>
  <text x="775" y="474" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#334a5b" font-weight="700">阶段 7</text>
  <text x="748" y="508" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#334a5b">多房间语义任务</text>

  <rect x="425" y="610" rx="18" ry="18" width="250" height="110" fill="#efd7d5" stroke="#93605c" stroke-width="3"/>
  <text x="480" y="654" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#633c39" font-weight="700">阶段 8</text>
  <text x="470" y="688" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#633c39">跨楼层能力评估</text>

  <line x1="320" y1="225" x2="365" y2="225" stroke="#7a6c61" stroke-width="4"/>
  <polygon points="365,225 343,214 343,236" fill="#7a6c61"/>
  <line x1="615" y1="225" x2="660" y2="225" stroke="#7a6c61" stroke-width="4"/>
  <polygon points="660,225 638,214 638,236" fill="#7a6c61"/>
  <line x1="910" y1="225" x2="955" y2="225" stroke="#7a6c61" stroke-width="4"/>
  <polygon points="955,225 933,214 933,236" fill="#7a6c61"/>

  <line x1="1045" y1="280" x2="1045" y2="340" stroke="#7a6c61" stroke-width="4"/>
  <line x1="1045" y1="340" x2="255" y2="340" stroke="#7a6c61" stroke-width="4"/>
  <line x1="255" y1="340" x2="255" y2="430" stroke="#7a6c61" stroke-width="4"/>
  <polygon points="255,430 244,408 266,408" fill="#7a6c61"/>

  <line x1="380" y1="485" x2="425" y2="485" stroke="#7a6c61" stroke-width="4"/>
  <polygon points="425,485 403,474 403,496" fill="#7a6c61"/>
  <line x1="675" y1="485" x2="720" y2="485" stroke="#7a6c61" stroke-width="4"/>
  <polygon points="720,485 698,474 698,496" fill="#7a6c61"/>
  <line x1="845" y1="540" x2="845" y2="585" stroke="#7a6c61" stroke-width="4"/>
  <line x1="845" y1="585" x2="550" y2="585" stroke="#7a6c61" stroke-width="4"/>
  <line x1="550" y1="585" x2="550" y2="610" stroke="#7a6c61" stroke-width="4"/>
  <polygon points="550,610 539,588 561,588" fill="#7a6c61"/>

  <text x="60" y="765" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#655b56">过关标准：阶段 3 要能稳定建图和定位，阶段 4 要能让 GPT 只做任务代理，阶段 6 要能完成单层自主导航，阶段 8 再决定是否进入电梯或楼梯路线。</text>
</svg>
