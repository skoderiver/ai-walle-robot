<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#f7f3ea"/>
  <text x="60" y="70" font-size="34" font-family="Segoe UI, Arial, sans-serif" fill="#2f3b36" font-weight="700">瓦力机器人总体架构示意</text>
  <text x="60" y="105" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#5a635e">推荐路线：ESP32 负责实时控制，树莓派或 Jetson 负责交互、视觉、AI，Unity 负责数字孪生与调试。</text>

  <rect x="70" y="150" rx="20" ry="20" width="250" height="140" fill="#dce8d5" stroke="#4e6b50" stroke-width="3"/>
  <text x="100" y="195" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#243127" font-weight="700">Unity 控制台</text>
  <text x="100" y="230" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#243127">数字孪生</text>
  <text x="100" y="258" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#243127">遥控 UI / 动作编辑</text>

  <rect x="470" y="140" rx="24" ry="24" width="280" height="170" fill="#b7d7ea" stroke="#2e6f8f" stroke-width="3"/>
  <text x="515" y="190" font-size="30" font-family="Segoe UI, Arial, sans-serif" fill="#113246" font-weight="700">高层计算板</text>
  <text x="515" y="228" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#113246">树莓派 5 / Jetson</text>
  <text x="515" y="256" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#113246">视觉 / 语音 / 状态机</text>
  <text x="515" y="284" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#113246">ROS2 / WebSocket / Python</text>

  <rect x="470" y="380" rx="24" ry="24" width="280" height="170" fill="#f4d29b" stroke="#9b6a18" stroke-width="3"/>
  <text x="545" y="430" font-size="30" font-family="Segoe UI, Arial, sans-serif" fill="#5c3b09" font-weight="700">底层 MCU</text>
  <text x="555" y="468" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#5c3b09">ESP32 / STM32</text>
  <text x="525" y="496" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#5c3b09">电机 / 舵机 / 传感器</text>
  <text x="560" y="524" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#5c3b09">急停 / 保护逻辑</text>

  <rect x="860" y="100" rx="20" ry="20" width="250" height="110" fill="#edd6c1" stroke="#8b5c3c" stroke-width="3"/>
  <text x="910" y="145" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#5a3a24" font-weight="700">摄像头</text>
  <text x="905" y="180" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#5a3a24">USB / CSI</text>

  <rect x="860" y="245" rx="20" ry="20" width="250" height="110" fill="#edd6c1" stroke="#8b5c3c" stroke-width="3"/>
  <text x="905" y="290" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#5a3a24" font-weight="700">麦克风</text>
  <text x="895" y="325" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#5a3a24">语音与唤醒词</text>

  <rect x="840" y="410" rx="20" ry="20" width="290" height="110" fill="#f0e4a6" stroke="#967d19" stroke-width="3"/>
  <text x="895" y="455" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#5e4d08" font-weight="700">履带驱动</text>
  <text x="885" y="490" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#5e4d08">双减速电机 + 驱动器</text>

  <rect x="840" y="555" rx="20" ry="20" width="290" height="110" fill="#f0e4a6" stroke="#967d19" stroke-width="3"/>
  <text x="895" y="600" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#5e4d08" font-weight="700">姿态执行</text>
  <text x="885" y="635" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#5e4d08">头部 / 手臂数字舵机</text>

  <line x1="320" y1="220" x2="470" y2="220" stroke="#4e6b50" stroke-width="5"/>
  <polygon points="470,220 448,208 448,232" fill="#4e6b50"/>
  <text x="350" y="205" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4e6b50">TCP / WebSocket / ROS-TCP</text>

  <line x1="610" y1="310" x2="610" y2="380" stroke="#2e6f8f" stroke-width="5"/>
  <polygon points="610,380 598,358 622,358" fill="#2e6f8f"/>
  <text x="635" y="353" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#2e6f8f">UART / USB Serial</text>

  <line x1="750" y1="195" x2="860" y2="155" stroke="#2e6f8f" stroke-width="4"/>
  <polygon points="860,155 837,150 845,172" fill="#2e6f8f"/>
  <line x1="750" y1="235" x2="860" y2="300" stroke="#2e6f8f" stroke-width="4"/>
  <polygon points="860,300 837,295 845,317" fill="#2e6f8f"/>

  <line x1="750" y1="465" x2="840" y2="465" stroke="#9b6a18" stroke-width="4"/>
  <polygon points="840,465 818,453 818,477" fill="#9b6a18"/>
  <line x1="750" y1="520" x2="840" y2="610" stroke="#9b6a18" stroke-width="4"/>
  <polygon points="840,610 818,603 825,625" fill="#9b6a18"/>

  <text x="65" y="715" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#68645c">思路要点：先做可遥控、可展示的 V1，再加感知与 AI，不把实时控制压在高层 Linux 上。</text>
</svg>
