<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#f6f6f2"/>
  <text x="60" y="70" font-size="34" font-family="Segoe UI, Arial, sans-serif" fill="#23313a" font-weight="700">供电与控制连接示意</text>
  <text x="60" y="105" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#586770">核心原则：动力、舵机、逻辑三路分电，所有地线共地，急停优先级最高。</text>

  <rect x="90" y="200" rx="18" ry="18" width="210" height="110" fill="#f0d39f" stroke="#9c6f1e" stroke-width="3"/>
  <text x="130" y="245" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#65460d" font-weight="700">电池组</text>
  <text x="115" y="282" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#65460d">锂电 + 保护板</text>

  <rect x="360" y="160" rx="18" ry="18" width="210" height="90" fill="#f3b8b8" stroke="#9e3f3f" stroke-width="3"/>
  <text x="410" y="215" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#672727" font-weight="700">总开关</text>

  <rect x="360" y="290" rx="18" ry="18" width="210" height="90" fill="#f3b8b8" stroke="#9e3f3f" stroke-width="3"/>
  <text x="422" y="345" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#672727" font-weight="700">急停</text>

  <rect x="650" y="100" rx="18" ry="18" width="220" height="100" fill="#dce7f3" stroke="#4c739f" stroke-width="3"/>
  <text x="710" y="145" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#27425f" font-weight="700">动力支路</text>
  <text x="700" y="178" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#27425f">保险丝 + 驱动器</text>

  <rect x="650" y="240" rx="18" ry="18" width="220" height="100" fill="#d8efdd" stroke="#3f8b50" stroke-width="3"/>
  <text x="710" y="285" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#285b34" font-weight="700">舵机支路</text>
  <text x="700" y="318" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#285b34">大电流 DC-DC</text>

  <rect x="650" y="380" rx="18" ry="18" width="220" height="100" fill="#e8e0f3" stroke="#7055a0" stroke-width="3"/>
  <text x="710" y="425" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#463170" font-weight="700">逻辑支路</text>
  <text x="700" y="458" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#463170">5V / 12V 稳压</text>

  <rect x="940" y="85" rx="18" ry="18" width="180" height="110" fill="#dce7f3" stroke="#4c739f" stroke-width="3"/>
  <text x="973" y="135" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#27425f" font-weight="700">履带电机</text>
  <text x="983" y="168" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#27425f">左右独立</text>

  <rect x="940" y="225" rx="18" ry="18" width="180" height="110" fill="#d8efdd" stroke="#3f8b50" stroke-width="3"/>
  <text x="975" y="275" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#285b34" font-weight="700">数字舵机</text>
  <text x="962" y="308" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#285b34">头部 / 手臂</text>

  <rect x="920" y="390" rx="18" ry="18" width="220" height="180" fill="#e8e0f3" stroke="#7055a0" stroke-width="3"/>
  <text x="978" y="435" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#463170" font-weight="700">逻辑设备</text>
  <text x="950" y="470" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#463170">ESP32</text>
  <text x="950" y="498" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#463170">树莓派 / Jetson</text>
  <text x="950" y="526" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#463170">摄像头 / 传感器</text>

  <rect x="470" y="560" rx="18" ry="18" width="280" height="110" fill="#f2ead3" stroke="#967f3f" stroke-width="3"/>
  <text x="548" y="605" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#62511e" font-weight="700">通信链路</text>
  <text x="505" y="638" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#62511e">Unity / Web - 高层 - 串口 - MCU</text>

  <line x1="300" y1="255" x2="360" y2="205" stroke="#9c6f1e" stroke-width="5"/>
  <polygon points="360,205 337,202 352,222" fill="#9c6f1e"/>
  <line x1="300" y1="255" x2="360" y2="335" stroke="#9c6f1e" stroke-width="5"/>
  <polygon points="360,335 339,324 358,310" fill="#9c6f1e"/>

  <line x1="570" y1="205" x2="650" y2="150" stroke="#9e3f3f" stroke-width="4"/>
  <polygon points="650,150 627,148 640,166" fill="#9e3f3f"/>
  <line x1="570" y1="335" x2="650" y2="290" stroke="#9e3f3f" stroke-width="4"/>
  <polygon points="650,290 627,288 640,306" fill="#9e3f3f"/>
  <line x1="570" y1="335" x2="650" y2="430" stroke="#9e3f3f" stroke-width="4"/>
  <polygon points="650,430 627,423 639,442" fill="#9e3f3f"/>

  <line x1="870" y1="150" x2="940" y2="140" stroke="#4c739f" stroke-width="4"/>
  <polygon points="940,140 918,130 921,152" fill="#4c739f"/>
  <line x1="870" y1="290" x2="940" y2="280" stroke="#3f8b50" stroke-width="4"/>
  <polygon points="940,280 918,270 921,292" fill="#3f8b50"/>
  <line x1="870" y1="430" x2="920" y2="480" stroke="#7055a0" stroke-width="4"/>
  <polygon points="920,480 898,471 907,490" fill="#7055a0"/>

  <line x1="1030" y1="570" x2="1030" y2="625" stroke="#7055a0" stroke-width="3" stroke-dasharray="10,8"/>
  <line x1="1030" y1="625" x2="610" y2="625" stroke="#7055a0" stroke-width="3" stroke-dasharray="10,8"/>
  <polygon points="610,625 632,615 632,635" fill="#7055a0"/>

  <text x="80" y="715" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#586770">保护优先级：急停 > 欠压停车 > 通信丢失停车 > 自动恢复。首次联调建议使用有线供电和串口。</text>
</svg>
