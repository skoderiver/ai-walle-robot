<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#f6f3ee"/>
  <text x="60" y="70" font-size="34" font-family="Segoe UI, Arial, sans-serif" fill="#2d3638" font-weight="700">自主机器人能力栈</text>
  <text x="60" y="105" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#5d6769">从“能聊天”到“能去二楼”不是一层能力，而是感知、定位、规划、运动控制、机械平台的整套叠加。</text>

  <rect x="90" y="610" rx="20" ry="20" width="1020" height="110" fill="#d8c3a8" stroke="#896645" stroke-width="3"/>
  <text x="480" y="655" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#533b26" font-weight="700">机械平台</text>
  <text x="210" y="690" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#533b26">平地轮式 / 履带底盘 / 楼梯履带 + 翻转臂 / 足式平台</text>

  <rect x="130" y="490" rx="20" ry="20" width="940" height="90" fill="#f0dd8d" stroke="#8c7222" stroke-width="3"/>
  <text x="455" y="545" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#5c4a13" font-weight="700">底层控制与安全</text>
  <text x="205" y="572" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#5c4a13">电机控制、急停、限位、欠压保护、失联停车、姿态保护</text>

  <rect x="170" y="380" rx="20" ry="20" width="860" height="80" fill="#cde2d0" stroke="#4e7f58" stroke-width="3"/>
  <text x="455" y="430" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#24462c" font-weight="700">导航与执行</text>
  <text x="260" y="454" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#24462c">建图、定位、避障、路径规划、任务执行、失败恢复</text>

  <rect x="210" y="270" rx="20" ry="20" width="780" height="80" fill="#cfe2f2" stroke="#4d7491" stroke-width="3"/>
  <text x="445" y="320" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#29465e" font-weight="700">感知与世界模型</text>
  <text x="275" y="344" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#29465e">RGB / 深度 / 激光雷达 / IMU / 里程计 / 语音输入 / 地图语义</text>

  <rect x="250" y="160" rx="20" ry="20" width="700" height="80" fill="#e2d2ef" stroke="#74539c" stroke-width="3"/>
  <text x="395" y="210" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#4c3468" font-weight="700">任务规划与大模型代理</text>
  <text x="315" y="234" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#4c3468">理解指令、调用工具、分解任务、请求确认、生成口语回复</text>

  <rect x="330" y="50" rx="20" ry="20" width="540" height="70" fill="#f2d1d1" stroke="#9d5252" stroke-width="3"/>
  <text x="470" y="94" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#672f2f" font-weight="700">人机交互</text>
  <text x="610" y="94" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#672f2f">语音 / 屏幕 / 灯光 / 动作反馈</text>

  <line x1="600" y1="610" x2="600" y2="580" stroke="#77685c" stroke-width="5"/>
  <polygon points="600,580 588,602 612,602" fill="#77685c"/>
  <line x1="600" y1="490" x2="600" y2="460" stroke="#77685c" stroke-width="5"/>
  <polygon points="600,460 588,482 612,482" fill="#77685c"/>
  <line x1="600" y1="380" x2="600" y2="350" stroke="#77685c" stroke-width="5"/>
  <polygon points="600,350 588,372 612,372" fill="#77685c"/>
  <line x1="600" y1="270" x2="600" y2="240" stroke="#77685c" stroke-width="5"/>
  <polygon points="600,240 588,262 612,262" fill="#77685c"/>
  <line x1="600" y1="160" x2="600" y2="120" stroke="#77685c" stroke-width="5"/>
  <polygon points="600,120 588,142 612,142" fill="#77685c"/>

  <text x="60" y="760" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#5d6769">关键判断：大模型可以做“理解与决策层”，但不能替代稳定定位、避障、楼梯机构和安全控制。</text>
</svg>
